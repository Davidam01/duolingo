name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

env:
  DATABASE_URL: "file:./dev.db"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Lint and typecheck
        run: |
          npm run lint
          npm run typecheck
